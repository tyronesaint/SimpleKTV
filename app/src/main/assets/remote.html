<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>简听KTV - 远程控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 12px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .header p {
            opacity: 0.9;
            font-size: 13px;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #667eea;
            background: white;
            border-bottom-color: #667eea;
        }

        .section {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section h2 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #333;
        }

        .now-playing {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            border-radius: 10px;
            padding: 16px;
        }

        .now-playing .song-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #1a1a2e;
        }

        .now-playing .song-artist {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .progress-bar {
            background: #bbdefb;
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .controls button.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 3px 12px rgba(102, 126, 234, 0.4);
        }

        .controls button.secondary {
            background: #f5f5f5;
            color: #333;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }

        .source-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .source-btn {
            padding: 6px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .source-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .song-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .song-item:hover {
            background: #f9f9f9;
        }

        .song-item .info {
            flex: 1;
            min-width: 0;
        }

        .song-item .info .title {
            font-weight: 500;
            color: #1a1a2e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-item .info .artist {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-item button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            background: #667eea;
            color: white;
        }

        .queue-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .queue-item.playing {
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            border-left: 3px solid #667eea;
        }

        .queue-item .position {
            font-weight: bold;
            margin-right: 10px;
            min-width: 24px;
            color: #667eea;
            font-size: 14px;
        }

        .queue-item .info {
            flex: 1;
            min-width: 0;
        }

        .queue-item .info .title {
            font-weight: 500;
            color: #1a1a2e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .queue-item .info .artist {
            font-size: 12px;
            color: #666;
        }

        .queue-item .actions {
            display: flex;
            gap: 6px;
        }

        .queue-item .actions button {
            padding: 5px 12px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }

        .queue-item .actions .play-btn {
            background: #667eea;
            color: white;
        }

        .queue-item .actions .remove-btn {
            background: #f5f5f5;
            color: #e53935;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .empty {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 14px;
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 13px;
        }

        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 13px;
        }

        .config-hint {
            background: #fff3e0;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #e65100;
        }

        @media (max-width: 600px) {
            .controls button {
                padding: 10px 18px;
                font-size: 14px;
            }
            
            .now-playing .song-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>简听KTV</h1>
            <p>远程点歌控制</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('search')">点歌</div>
            <div class="tab" onclick="showTab('control')">控制</div>
            <div class="tab" onclick="showTab('queue')">队列</div>
        </div>

        <!-- 点歌页面 -->
        <div id="searchTab">
            <div class="section">
                <div id="configHint" class="config-hint" style="display:none;">
                    设备未配置服务器，请先在设备上配置管理地址
                </div>
                
                <div class="source-selector" id="sourceSelector">
                    <!-- 音源按钮将动态生成 -->
                </div>
                
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索歌曲、歌手" onkeypress="handleKeyPress(event)">
                    <button onclick="doSearch()">搜索</button>
                </div>
            </div>

            <div class="section">
                <h2>搜索结果 <span id="resultCount" style="font-size:12px;color:#666;font-weight:normal;"></span></h2>
                <div id="searchResults" class="song-list">
                    <div class="empty">输入关键词搜索歌曲</div>
                </div>
            </div>
        </div>

        <!-- 控制页面 -->
        <div id="controlTab" style="display:none;">
            <div class="section">
                <h2>正在播放</h2>
                <div id="nowPlaying" class="now-playing">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="section">
                <h2>播放控制</h2>
                <div class="controls">
                    <button class="secondary" onclick="previous()">上一首</button>
                    <button class="primary" onclick="playPause()" id="playPauseBtn">播放</button>
                    <button class="secondary" onclick="next()">下一首</button>
                </div>
            </div>
        </div>

        <!-- 队列页面 -->
        <div id="queueTab" style="display:none;">
            <div class="section">
                <h2>播放队列 <span id="queueSize" style="font-size:12px;color:#666;font-weight:normal;"></span></h2>
                <div id="queueList" class="song-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var DEVICE_API = '/api';
        var config = null;
        var currentSource = '';
        var refreshInterval = null;

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
            
            // 定时刷新状态
            refreshInterval = setInterval(function() {
                loadStatus();
                loadQueue();
            }, 3000);
        });

        // Tab切换
        function showTab(tab) {
            document.getElementById('searchTab').style.display = tab === 'search' ? 'block' : 'none';
            document.getElementById('controlTab').style.display = tab === 'control' ? 'block' : 'none';
            document.getElementById('queueTab').style.display = tab === 'queue' ? 'block' : 'none';
            
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(t) { t.classList.remove('active'); });
            event.target.classList.add('active');
        }

        // 加载设备配置
        function loadConfig() {
            ajaxGet(DEVICE_API + '/config', function(data, error) {
                if (error) {
                    document.getElementById('configHint').style.display = 'block';
                    document.getElementById('configHint').textContent = '无法连接设备';
                    return;
                }
                
                config = data;
                
                if (!data.configured) {
                    document.getElementById('configHint').style.display = 'block';
                    document.getElementById('configHint').textContent = '设备未配置服务器，请先在设备上配置管理地址';
                    return;
                }
                
                document.getElementById('configHint').style.display = 'none';
                
                // 生成音源按钮
                var sourceSelector = document.getElementById('sourceSelector');
                sourceSelector.innerHTML = '';
                
                if (data.supportedSources && data.supportedSources.length > 0) {
                    data.supportedSources.forEach(function(source, index) {
                        var btn = document.createElement('button');
                        btn.className = 'source-btn' + (index === 0 ? ' active' : '');
                        btn.textContent = getPlatformName(source);
                        btn.onclick = function() {
                            currentSource = source;
                            document.querySelectorAll('.source-btn').forEach(function(b) { b.classList.remove('active'); });
                            btn.classList.add('active');
                        };
                        sourceSelector.appendChild(btn);
                    });
                    currentSource = data.supportedSources[0];
                }
            });
        }

        // 搜索歌曲 - 直接调用音乐API
        function doSearch() {
            var keyword = document.getElementById('searchInput').value.trim();
            
            if (!keyword) {
                alert('请输入搜索关键词');
                return;
            }
            
            if (!config || !config.configured) {
                alert('设备未配置服务器');
                return;
            }
            
            if (!currentSource) {
                alert('没有可用的音源');
                return;
            }
            
            var resultsDiv = document.getElementById('searchResults');
            var countSpan = document.getElementById('resultCount');
            resultsDiv.innerHTML = '<div class="loading">搜索中...</div>';
            countSpan.textContent = '';
            
            // 直接调用音乐服务API
            var searchUrl = config.baseUrl + '/' + config.apiKey + '/api/search';
            searchUrl += '?keyword=' + encodeURIComponent(keyword);
            searchUrl += '&source=' + currentSource;
            searchUrl += '&page=1&pageSize=30';
            
            jsonpGet(searchUrl, function(data, error) {
                if (error) {
                    var errorDetail = '搜索失败<br>';
                    errorDetail += '原因: ' + error + '<br>';
                    errorDetail += 'URL: ' + searchUrl;
                    resultsDiv.innerHTML = '<div class="error-msg">' + errorDetail + '</div>';
                    return;
                }
                
                if (data.code !== 200) {
                    var errorDetail = '搜索失败<br>';
                    errorDetail += '错误码: ' + data.code + '<br>';
                    errorDetail += '错误信息: ' + (data.msg || '未知错误');
                    resultsDiv.innerHTML = '<div class="error-msg">' + errorDetail + '</div>';
                    return;
                }
                
                // 解析嵌套的搜索结果结构
                var songs = [];
                var searchData = data.data;
                
                if (searchData && searchData.results) {
                    // data.results 是按平台分组的数组
                    searchData.results.forEach(function(platform) {
                        if (platform.results) {
                            platform.results.forEach(function(song) {
                                songs.push({
                                    title: song.name,
                                    artist: song.singer,
                                    album: song.album,
                                    id: song.id,
                                    source: song.source,
                                    interval: song.interval,
                                    musicInfo: song.musicInfo
                                });
                            });
                        }
                    });
                }
                
                countSpan.textContent = '(找到 ' + songs.length + ' 首)';
                
                if (songs.length === 0) {
                    resultsDiv.innerHTML = '<div class="empty">未找到相关歌曲</div>';
                    return;
                }
                
                var html = '';
                songs.forEach(function(song) {
                    var title = song.title || '未知歌曲';
                    var artist = song.artist || '未知歌手';
                    var album = song.album || '';
                    var songId = song.id || '';
                    var source = song.source || currentSource;
                    var duration = song.interval ? formatDuration(song.interval) : '';
                    
                    html += '<div class="song-item">' +
                        '<div class="info">' +
                        '<div class="title">' + escapeHtml(title) + '</div>' +
                        '<div class="artist">' + escapeHtml(artist) + (album ? ' - ' + escapeHtml(album) : '') + (duration ? ' [' + duration + ']' : '') + '</div>' +
                        '</div>' +
                        '<button onclick="addSong(\'' + escapeJs(title) + '\', \'' + escapeJs(artist) + '\', \'' + 
                        escapeJs(album) + '\', \'' + escapeJs(source) + '\', \'' + escapeJs(songId) + '\')">点歌</button>' +
                        '</div>';
                });
                
                resultsDiv.innerHTML = html;
            });
        }
        
        // 格式化时长
        function formatDuration(seconds) {
            var min = Math.floor(seconds / 60);
            var sec = seconds % 60;
            return min + ':' + (sec < 10 ? '0' : '') + sec;
        }

        // 添加歌曲到设备队列
        function addSong(title, artist, album, source, songId) {
            // 先获取播放URL
            var urlApi = config.baseUrl + '/' + config.apiKey + '/api/music/url';
            
            // 显示加载状态
            var resultsDiv = document.getElementById('searchResults');
            var originalHtml = resultsDiv.innerHTML;
            resultsDiv.innerHTML = '<div class="loading">正在获取播放地址...</div>';
            
            // 使用POST请求获取播放地址
            ajaxPostExternal(urlApi, {
                source: source,
                songId: songId,
                quality: '320k'
            }, function(data, error) {
                if (error) {
                    resultsDiv.innerHTML = originalHtml;
                    var errorDetail = '获取播放地址失败\n';
                    errorDetail += '原因: ' + error + '\n';
                    errorDetail += '歌曲: ' + title + ' - ' + artist + '\n';
                    errorDetail += 'source: ' + source + '\n';
                    errorDetail += 'songId: ' + songId;
                    alert(errorDetail);
                    return;
                }
                
                if (data.code !== 200) {
                    resultsDiv.innerHTML = originalHtml;
                    var errorDetail = '获取播放地址失败\n';
                    errorDetail += '错误码: ' + data.code + '\n';
                    errorDetail += '错误信息: ' + (data.msg || '未知错误');
                    alert(errorDetail);
                    return;
                }
                
                var musicUrl = data.data && data.data.url ? data.data.url : '';
                var musicType = data.data && data.data.type ? data.data.type : '';
                var lyric = data.data && data.data.lyric ? data.data.lyric : '';
                var tlyric = data.data && data.data.tlyric ? data.data.tlyric : '';
                
                if (!musicUrl) {
                    resultsDiv.innerHTML = originalHtml;
                    alert('无法获取播放地址\n歌曲: ' + title + '\n返回数据中没有播放地址');
                    return;
                }
                
                // 推送歌曲到设备（包含歌词）
                ajaxPost(DEVICE_API + '/queue/add-online', {
                    title: title,
                    artist: artist,
                    album: album,
                    source: source,
                    songId: songId,
                    musicUrl: musicUrl,
                    musicType: musicType,
                    lyric: lyric,
                    tlyric: tlyric
                }, function(result, err) {
                    resultsDiv.innerHTML = originalHtml;
                    
                    if (err) {
                        var errorDetail = '添加失败\n';
                        errorDetail += '原因: ' + err + '\n';
                        errorDetail += '请检查设备连接';
                        alert(errorDetail);
                        return;
                    }
                    
                    if (result.success) {
                        // 显示成功消息
                        var msg = document.createElement('div');
                        msg.className = 'success-msg';
                        msg.textContent = '已添加: ' + title;
                        msg.style.position = 'fixed';
                        msg.style.top = '20px';
                        msg.style.left = '50%';
                        msg.style.transform = 'translateX(-50%)';
                        msg.style.zIndex = '1000';
                        document.body.appendChild(msg);
                        
                        setTimeout(function() {
                            msg.remove();
                        }, 2000);
                        
                        // 切换到队列页
                        document.querySelector('.tab:nth-child(3)').click();
                    } else {
                        var errorDetail = '添加失败\n';
                        errorDetail += '原因: ' + (result.error || result.message || '未知错误');
                        alert(errorDetail);
                    }
                });
            });
        }

        // 键盘事件
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                doSearch();
            }
        }

        // 加载播放状态
        function loadStatus() {
            ajaxGet(DEVICE_API + '/status', function(data, error) {
                var nowPlayingDiv = document.getElementById('nowPlaying');
                var playPauseBtn = document.getElementById('playPauseBtn');

                if (error) {
                    nowPlayingDiv.innerHTML = '<div class="empty">加载失败</div>';
                    return;
                }

                if (playPauseBtn) {
                    playPauseBtn.textContent = data.isPlaying ? '暂停' : '播放';
                }

                if (data && (data.currentSong || data.currentTitle)) {
                    var title = data.currentTitle || (data.currentSong ? data.currentSong.title : '未知歌曲');
                    var artist = data.currentArtist || (data.currentSong ? data.currentSong.artist : '未知歌手');
                    
                    var html = '<div class="song-title">' + escapeHtml(title) + '</div>' +
                        '<div class="song-artist">' + escapeHtml(artist) + '</div>';
                    
                    if (data.duration > 0) {
                        var progress = data.progress || 0;
                        var positionText = data.positionText || '0:00';
                        var durationText = data.durationText || '0:00';
                        
                        html += '<div style="margin-top:12px;">' +
                            '<div class="progress-bar" onclick="seekTo(event)">' +
                            '<div class="progress-fill" style="width: ' + progress + '%;"></div>' +
                            '</div>' +
                            '<div class="progress-time">' +
                            '<span>' + positionText + '</span>' +
                            '<span>' + durationText + '</span>' +
                            '</div></div>';
                    }
                    
                    html += '<div style="color:#888;font-size:11px;margin-top:10px;">队列: ' + data.queueSize + ' 首歌曲</div>';
                    
                    nowPlayingDiv.innerHTML = html;
                } else {
                    nowPlayingDiv.innerHTML = '<div class="empty">未播放</div>';
                }
            });
        }

        // 加载队列
        function loadQueue() {
            ajaxGet(DEVICE_API + '/queue', function(data, error) {
                var queueListDiv = document.getElementById('queueList');
                var queueSizeSpan = document.getElementById('queueSize');

                if (error) {
                    queueListDiv.innerHTML = '<div class="empty">加载失败</div>';
                    return;
                }

                if (queueSizeSpan && data && data.queue) {
                    queueSizeSpan.textContent = '(' + data.queue.length + ' 首歌曲)';
                }

                if (!data || !data.queue || data.queue.length === 0) {
                    queueListDiv.innerHTML = '<div class="empty">队列为空</div>';
                    return;
                }

                var html = '';
                var currentIndex = data.currentIndex || 0;
                
                for (var i = 0; i < data.queue.length; i++) {
                    var item = data.queue[i];
                    var isPlaying = (i === currentIndex);
                    
                    html += '<div class="queue-item' + (isPlaying ? ' playing' : '') + '">' +
                        '<span class="position">' + (i + 1) + '</span>' +
                        '<div class="info">' +
                        '<div class="title">' + escapeHtml(item.title || '未知歌曲') + '</div>' +
                        '<div class="artist">' + escapeHtml(item.artist || '未知歌手') + '</div>' +
                        '</div>' +
                        '<div class="actions">' +
                        '<button class="play-btn" onclick="jumpTo(' + i + ')">播</button>' +
                        '<button class="remove-btn" onclick="removeFromQueue(' + item.id + ')">删</button>' +
                        '</div>' +
                        '</div>';
                }

                queueListDiv.innerHTML = html;
            });
        }

        // 播放控制
        function playPause() {
            ajaxGet(DEVICE_API + '/status', function(statusData) {
                if (statusData.isPlaying) {
                    ajaxPost(DEVICE_API + '/control/pause', {}, loadStatus);
                } else {
                    ajaxPost(DEVICE_API + '/control/play', {}, loadStatus);
                }
            });
        }

        function previous() {
            ajaxPost(DEVICE_API + '/control/previous', {}, function() {
                loadStatus();
                loadQueue();
            });
        }

        function next() {
            ajaxPost(DEVICE_API + '/control/next', {}, function() {
                loadStatus();
                loadQueue();
            });
        }

        function jumpTo(index) {
            ajaxPost(DEVICE_API + '/control/jump', { index: index }, function() {
                loadStatus();
                loadQueue();
            });
        }

        function removeFromQueue(id) {
            ajaxPost(DEVICE_API + '/queue/remove', { id: id }, loadQueue);
        }

        function seekTo(event) {
            var progressBar = event.currentTarget;
            var rect = progressBar.getBoundingClientRect();
            var percent = Math.round(((event.clientX - rect.left) / rect.width) * 100);
            
            ajaxPost(DEVICE_API + '/control/seek', { percent: percent }, loadStatus);
        }

        // 工具函数
        function ajaxGet(url, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            callback(JSON.parse(xhr.responseText), null);
                        } catch (e) {
                            callback(null, 'Parse error');
                        }
                    } else {
                        callback(null, 'Error: ' + xhr.status);
                    }
                }
            };
            xhr.onerror = function() { callback(null, 'Network error'); };
            xhr.send();
        }

        function ajaxPost(url, data, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            callback(JSON.parse(xhr.responseText), null);
                        } catch (e) {
                            callback(null, 'Parse error');
                        }
                    } else {
                        callback(null, 'Error: ' + xhr.status);
                    }
                }
            };
            xhr.onerror = function() { callback(null, 'Network error'); };
            xhr.send(JSON.stringify(data));
        }

        function ajaxPostExternal(url, data, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.timeout = 30000; // 30秒超时
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            callback(JSON.parse(xhr.responseText), null);
                        } catch (e) {
                            callback(null, '响应解析失败: ' + e.message);
                        }
                    } else if (xhr.status === 0) {
                        callback(null, '网络错误 (可能跨域被阻止)\nURL: ' + url);
                    } else {
                        var errorDetail = 'HTTP ' + xhr.status + '\n';
                        errorDetail += 'URL: ' + url + '\n';
                        try {
                            var resp = JSON.parse(xhr.responseText);
                            errorDetail += '错误: ' + (resp.msg || resp.error || xhr.responseText.substring(0, 200));
                        } catch (e) {
                            errorDetail += '响应: ' + xhr.responseText.substring(0, 200);
                        }
                        callback(null, errorDetail);
                    }
                }
            };
            
            xhr.ontimeout = function() {
                callback(null, '请求超时 (30秒)\nURL: ' + url);
            };
            
            xhr.onerror = function() {
                callback(null, '网络错误\nURL: ' + url + '\n请检查服务器地址是否正确');
            };
            
            xhr.send(JSON.stringify(data));
        }

        function jsonpGet(url, callback) {
            // 使用 CORS 方式请求
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.timeout = 30000; // 30秒超时
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            callback(JSON.parse(xhr.responseText), null);
                        } catch (e) {
                            callback(null, '响应解析失败: ' + e.message + '\n响应内容: ' + xhr.responseText.substring(0, 200));
                        }
                    } else if (xhr.status === 0) {
                        callback(null, '网络错误 (可能跨域被阻止)\nURL: ' + url + '\n请检查服务器是否支持CORS');
                    } else {
                        var errorDetail = 'HTTP ' + xhr.status + '\n';
                        errorDetail += 'URL: ' + url + '\n';
                        try {
                            var resp = JSON.parse(xhr.responseText);
                            errorDetail += '错误: ' + (resp.msg || resp.error || '未知错误');
                            if (resp.code) errorDetail += ' (code: ' + resp.code + ')';
                        } catch (e) {
                            errorDetail += '响应: ' + xhr.responseText.substring(0, 200);
                        }
                        callback(null, errorDetail);
                    }
                }
            };
            
            xhr.ontimeout = function() {
                callback(null, '请求超时 (30秒)\nURL: ' + url);
            };
            
            xhr.onerror = function() {
                callback(null, '网络错误\nURL: ' + url + '\n请检查网络连接和服务器地址');
            };
            
            xhr.send();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;');
        }

        function escapeJs(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\')
                      .replace(/'/g, "\\'")
                      .replace(/"/g, '\\"')
                      .replace(/\n/g, '\\n');
        }

        function getPlatformName(platform) {
            var names = {
                'kw': '酷我',
                'kg': '酷狗',
                'tx': 'QQ音乐',
                'qq': 'QQ音乐',
                'wy': '网易云',
                'mg': '咪咕'
            };
            return names[platform] || platform.toUpperCase();
        }
